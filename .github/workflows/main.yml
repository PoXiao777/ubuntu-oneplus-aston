name: rootfs

on:
  workflow_dispatch:
    inputs:
      config:
        description: "The URL of the custom config"
        required: true
        default: "Default"

jobs:

  rootfs:
    runs-on: ubuntu-22.04-arm
    strategy:
            matrix:
                desktop: [ubuntu-desktop]
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt update && sudo apt install unzip bash tar git wget dpkg simg2img

      - name: Build rootfs
        run: sudo sh aston-mobian.sh ${{ matrix.desktop }} ${{ github.workspace }}

      - name: Upload rootfs.img
        uses: actions/upload-artifact@v4
        with:
          name: between_${{ matrix.desktop }}
          path: rootfs.7z
          compression-level: 0
        
      - name: Upload rootfs.7z
        uses: actions/upload-artifact@v4
        with:
          name: rootfs_${{ matrix.desktop }}_${{ matrix.kernel }}
          path: rootfs.7z
          compression-level: 0
          
